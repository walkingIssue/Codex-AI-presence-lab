name: E2E gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Repository containing the skill source to validate
        required: false
        type: string
      source-ref:
        description: Git ref or SHA from the source repository
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-windows:
    name: Windows contract and package
    runs-on: windows-latest
    steps:
      - name: Check out source under test
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source-repository || github.repository }}
          ref: ${{ inputs.source-ref || github.sha }}
          path: source

      - name: Check out lab tooling
        uses: actions/checkout@v4
        with:
          repository: walkingIssue/Codex-AI-presence-lab
          ref: main
          path: lab

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install contract test dependencies
        shell: pwsh
        run: python -m pip install pytest

      - name: Run source contract suites
        shell: pwsh
        working-directory: source
        run: |
          if (Test-Path presence-runtime/tests) {
            $env:PYTHONPATH = (Resolve-Path presence-runtime/src).Path
            python -m pytest -q presence-runtime/tests
            python ../lab/tools/runtime_manifest.py --check
          }
          python -m pytest -q skills/codex-voice/tests
          if (Test-Path live2d-avatar-runtime/tests) {
            $env:PYTHONPATH = (Resolve-Path live2d-avatar-runtime/src).Path
            python -m pytest -q live2d-avatar-runtime/tests
          }
          npm --prefix presence-runtime/renderer-host test -- --runInBand

      - name: Project the installable skill
        shell: pwsh
        working-directory: lab
        run: |
          python tools/project_release.py --source ../source --output dist
          python tools/e2e_check.py --source dist

      - name: Run projected contract suites
        shell: pwsh
        working-directory: lab
        run: |
          python -m pytest -q dist/skills/codex-voice/tests
          if (Test-Path ../source/presence-runtime/tests) {
            $env:PYTHONPATH = (Resolve-Path dist/skills/codex-voice/presence-runtime/src).Path
            python -m pytest -q ../source/presence-runtime/tests
          }
          if (Test-Path ../source/live2d-avatar-runtime/tests) {
            $env:PYTHONPATH = (Resolve-Path dist/skills/codex-voice/live2d-avatar-runtime/src).Path
            python -m pytest -q ../source/live2d-avatar-runtime/tests
          }
          npm --prefix dist/skills/codex-voice/presence-runtime/renderer-host test -- --runInBand

      - name: Create installable artifact
        shell: pwsh
        working-directory: lab
        run: |
          Compress-Archive -Path dist/skills/codex-voice -DestinationPath codex-ai-presence-skill.zip

      - name: Upload installable artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-ai-presence-skill
          path: lab/codex-ai-presence-skill.zip
          if-no-files-found: error

  validate-fedora:
    name: Fedora contract
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
      - name: Install Fedora contract dependencies
        shell: bash
        run: dnf install -y git python3 python3-pip nodejs npm tar gzip

      - name: Check out source under test
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source-repository || github.repository }}
          ref: ${{ inputs.source-ref || github.sha }}
          path: source

      - name: Check out lab tooling
        uses: actions/checkout@v4
        with:
          repository: walkingIssue/Codex-AI-presence-lab
          ref: main
          path: lab

      - name: Create Fedora contract environment
        shell: bash
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip pytest

      - name: Run source contract suites
        shell: bash
        working-directory: source
        run: |
          if [ -d presence-runtime/tests ]; then
            PYTHONPATH="$PWD/presence-runtime/src" ../.venv/bin/python -m pytest -q presence-runtime/tests
            ../.venv/bin/python ../lab/tools/runtime_manifest.py --check
          fi
          ../.venv/bin/python -m pytest -q skills/codex-voice/tests
          if [ -d live2d-avatar-runtime/tests ]; then
            PYTHONPATH="$PWD/live2d-avatar-runtime/src" ../.venv/bin/python -m pytest -q live2d-avatar-runtime/tests
          fi
          npm --prefix presence-runtime/renderer-host test -- --runInBand

      - name: Project the installable skill
        shell: bash
        working-directory: lab
        run: |
          ../.venv/bin/python tools/project_release.py --source ../source --output dist
          ../.venv/bin/python tools/e2e_check.py --source dist

      - name: Run projected contract suites
        shell: bash
        working-directory: lab
        run: |
          ../.venv/bin/python -m pytest -q dist/skills/codex-voice/tests
          if [ -d ../source/presence-runtime/tests ]; then
            PYTHONPATH="$PWD/dist/skills/codex-voice/presence-runtime/src" ../.venv/bin/python -m pytest -q ../source/presence-runtime/tests
          fi
          if [ -d ../source/live2d-avatar-runtime/tests ]; then
            PYTHONPATH="$PWD/dist/skills/codex-voice/live2d-avatar-runtime/src" ../.venv/bin/python -m pytest -q ../source/live2d-avatar-runtime/tests
          fi
          npm --prefix dist/skills/codex-voice/presence-runtime/renderer-host test -- --runInBand
