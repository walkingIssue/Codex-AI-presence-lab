<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'" />
    <title>Anime Presence POC</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="avatar" aria-label="Voice-reactive anime presence">
      <svg id="avatar-svg" viewBox="0 0 440 440" role="img" aria-labelledby="title desc">
        <title id="title">Anime presence companion</title>
        <desc id="desc">A voice-reactive stylized companion with animated eyes, eyelids, head, and mouth.</desc>
        <defs>
          <linearGradient id="hair-gradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#272c55" />
            <stop offset="0.55" stop-color="#7656b8" />
            <stop offset="1" stop-color="#e17db2" />
          </linearGradient>
          <linearGradient id="skin-gradient" x1="0" y1="0" x2="0.9" y2="1">
            <stop offset="0" stop-color="#fff1ec" />
            <stop offset="1" stop-color="#edb9be" />
          </linearGradient>
          <linearGradient id="top-gradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#202842" />
            <stop offset="1" stop-color="#8e3b76" />
          </linearGradient>
          <radialGradient id="eye-gradient" cx="40%" cy="30%">
            <stop offset="0" stop-color="#b9f5ff" />
            <stop offset="0.45" stop-color="#5aa9e6" />
            <stop offset="1" stop-color="#513d9a" />
          </radialGradient>
          <filter id="soft-glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <g id="character">
          <path class="presence-halo" d="M220 28 C315 32 390 105 402 202 C410 304 343 390 220 414 C97 390 30 304 38 202 C50 105 125 32 220 28Z" />

          <g id="body">
            <path class="shoulder-shadow" d="M42 440 C46 354 96 321 151 309 C176 303 191 296 220 296 C249 296 264 303 289 309 C344 321 394 354 398 440Z" />
            <path class="top" d="M53 440 C58 361 100 333 154 321 C177 316 198 313 220 313 C242 313 263 316 286 321 C340 333 382 361 387 440Z" />
            <path class="collar" d="M163 318 C174 340 192 353 220 357 C248 353 266 340 277 318 L260 307 C250 331 236 340 220 342 C204 340 190 331 180 307Z" />
            <path class="neck" d="M182 251 C185 281 181 303 165 321 C182 345 201 354 220 355 C239 354 258 345 275 321 C259 303 255 281 258 251Z" />
            <ellipse class="bust-left" cx="158" cy="377" rx="65" ry="50" />
            <ellipse class="bust-right" cx="282" cy="377" rx="65" ry="50" />
            <path class="top-highlight" d="M83 391 C118 350 151 348 184 374 C160 360 128 367 100 404Z" />
            <path class="top-highlight" d="M357 391 C322 350 289 348 256 374 C280 360 312 367 340 404Z" />
            <path class="ribbon" d="M220 345 L248 391 L220 421 L192 391Z" />
            <circle class="ribbon-gem" cx="220" cy="391" r="9" />
          </g>

          <g id="head">
            <path class="hair-back" d="M89 185 C71 105 126 49 220 48 C314 49 369 105 351 185 C347 259 320 310 277 329 L163 329 C120 310 93 259 89 185Z" />
            <path class="face" d="M112 165 C112 91 158 67 220 67 C282 67 328 91 328 165 C328 245 288 294 220 302 C152 294 112 245 112 165Z" />
            <path class="ear left" d="M115 177 C88 164 78 187 93 216 C99 228 110 232 120 225Z" />
            <path class="ear right" d="M325 177 C352 164 362 187 347 216 C341 228 330 232 320 225Z" />

            <g id="eyes">
              <g class="eye left-eye">
                <ellipse class="eye-white" cx="166" cy="177" rx="39" ry="27" />
                <ellipse class="iris" cx="166" cy="178" rx="19" ry="22" />
                <ellipse class="pupil" cx="166" cy="179" rx="8" ry="13" />
                <circle class="eye-light" cx="159" cy="169" r="5" />
                <ellipse class="lid" cx="166" cy="178" rx="40" ry="28" />
                <path class="lash" d="M127 164 C143 144 184 143 205 164" />
              </g>
              <g class="eye right-eye">
                <ellipse class="eye-white" cx="274" cy="177" rx="39" ry="27" />
                <ellipse class="iris" cx="274" cy="178" rx="19" ry="22" />
                <ellipse class="pupil" cx="274" cy="179" rx="8" ry="13" />
                <circle class="eye-light" cx="267" cy="169" r="5" />
                <ellipse class="lid" cx="274" cy="178" rx="40" ry="28" />
                <path class="lash" d="M235 164 C256 143 297 144 313 164" />
              </g>
            </g>

            <path class="nose" d="M219 195 C212 216 214 225 226 227" />
            <g id="mouth">
              <path class="mouth-line" d="M190 247 C205 258 235 258 250 247" />
              <ellipse class="mouth-open" cx="220" cy="251" rx="25" ry="4" />
              <path class="mouth-highlight" d="M204 252 C214 248 226 248 236 252" />
            </g>

            <path class="hair-front" d="M104 149 C105 78 159 43 220 48 C281 43 335 78 336 149 C310 122 290 113 269 110 C262 139 245 157 220 170 C195 157 178 139 171 110 C150 113 130 122 104 149Z" />
            <path class="hair-lock left-lock" d="M123 112 C87 145 83 217 113 269 C130 292 145 306 160 314 C133 260 132 190 157 131Z" />
            <path class="hair-lock right-lock" d="M317 112 C353 145 357 217 327 269 C310 292 295 306 280 314 C307 260 308 190 283 131Z" />
            <path class="hair-shine" d="M151 91 C172 69 202 62 230 64 C193 75 178 96 169 126Z" />
          </g>
        </g>
      </svg>
      <div class="status" aria-hidden="true">PRESENCE</div>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
